<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <radialGradient id="g1" cx="15%" cy="8%" r="55%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.30"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="88%" cy="92%" r="55%">
      <stop offset="0" stop-color="#ff8a4c" stop-opacity="0.18"/><stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#b794ff"/></linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#0a0e1a"/>
  <rect width="1080" height="1080" fill="url(#g1)"/>
  <rect width="1080" height="1080" fill="url(#g2)"/>

  <text x="540" y="180" text-anchor="middle" fill="#ffffff" font-size="76" font-weight="800">CÓMO FUNCIONA</text>

  <!-- step 1 -->
  <g transform="translate(110 290)">
    <rect width="860" height="180" rx="32" fill="#ffffff" opacity="0.05"/>
    <circle cx="100" cy="90" r="52" fill="url(#v)"/>
    <text x="100" y="110" text-anchor="middle" fill="#fff" font-size="56" font-weight="800">1</text>
    <text x="200" y="80" fill="#ffffff" font-size="44" font-weight="700">Responde las 3</text>
    <text x="200" y="135" fill="#ffffff" font-size="44" font-weight="700">preguntas del día ⏱️</text>
  </g>
  <!-- step 2 -->
  <g transform="translate(110 500)">
    <rect width="860" height="180" rx="32" fill="#ffffff" opacity="0.05"/>
    <circle cx="100" cy="90" r="52" fill="url(#v)"/>
    <text x="100" y="110" text-anchor="middle" fill="#fff" font-size="56" font-weight="800">2</text>
    <text x="200" y="80" fill="#ffffff" font-size="44" font-weight="700">Crea tu grupo e</text>
    <text x="200" y="135" fill="#ffffff" font-size="44" font-weight="700">invita a tu gente 👥</text>
  </g>
  <!-- step 3 -->
  <g transform="translate(110 710)">
    <rect width="860" height="180" rx="32" fill="#ffffff" opacity="0.05"/>
    <circle cx="100" cy="90" r="52" fill="url(#v)"/>
    <text x="100" y="110" text-anchor="middle" fill="#fff" font-size="56" font-weight="800">3</text>
    <text x="200" y="80" fill="#ffffff" font-size="44" font-weight="700">Compitan en el ranking</text>
    <text x="200" y="135" fill="#ffffff" font-size="44" font-weight="700">y al chat 🏆</text>
  </g>

  <text x="540" y="990" text-anchor="middle" fill="#b794ff" font-size="40" font-weight="700">1 minuto al día · Link en bio 🦉</text>
</svg>
